<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Customer Churn Dashboard</title>

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
}

/* HEADER */
.header {
    padding: 20px;
}

.header img {
    width: 40px;
    vertical-align: middle;
}

.header h1 {
    display: inline;
    margin-left: 10px;
    font-size: 26px;
}

/* DESCRIPTION */
.desc {
    font-size: 15px;
    color: #ddd;
    margin-bottom: 20px;
}

/* SLIDER */
.slider {
    position: relative;
    width: 85%;
    max-width: 900px;
    margin: auto;
    backdrop-filter: blur(10px);
}

/* IMAGE STYLE */
.slider img {
    width: 100%;
    border-radius: 15px;
    display: none;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: 0.5s;
}

.active {
    display: block;
    animation: fade 0.6s ease-in-out;
}

/* FADE ANIMATION */
@keyframes fade {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 40px;
    cursor: pointer;
    padding: 10px;
    color: white;
    transition: 0.3s;
}

.left { left: -50px; }
.right { right: -50px; }

.arrow:hover {
    color: #f2c811;
    transform: translateY(-50%) scale(1.2);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 14px;
    color: #bbb;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/cf/New_Power_BI_Logo.svg">
    <h1>Bank Customer Churn Dashboard</h1>
</div>

<!-- DESCRIPTION -->
<div class="desc">
    Interactive Power BI dashboard showcasing churn insights, customer behavior, and risk patterns.
</div>

<!-- SLIDER -->
<div class="slider">

    <div class="arrow left" onclick="prevSlide()">❮</div>

    <!-- ✅ FIXED PATH (use direct or same folder images) -->
    <img src="https://github.com/Nikhil-Palye/Bank-Customer-Churn/blob/main/PBI_img1.png" class="active">
    <img src="https://github.com/Nikhil-Palye/Bank-Customer-Churn/blob/main/PBI_img2.png">

    <div class="arrow right" onclick="nextSlide()">❯</div>

</div>

<!-- FOOTER -->
<div class="footer">
    Created by Nikhil Palye
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slider img");

function showSlide(i) {
    slides.forEach(img => img.classList.remove("active"));
    slides[i].classList.add("active");
}

function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
}

function prevSlide() {
    index = (index - 1 + slides.length) % slides.length;
    showSlide(index);
}

// Click to open full image
slides.forEach(img => {
    img.onclick = () => window.open(img.src, "_blank");
});
</script>

</body>
</html>
